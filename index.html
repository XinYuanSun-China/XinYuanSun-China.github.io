<!-- 添加以下流星雨代码 -->
<script>
function createMeteor() {
    var meteor = document.createElement("div");
    meteor.className = "meteor";
    meteor.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(meteor);

    var duration = Math.random() * 5 + 1; // 随机持续时间（1到6秒）
    var delay = Math.random() * 3; // 随机延迟（0到3秒）

    setTimeout(function() {
        meteor.style.transition = "none";
        meteor.style.height = "0px";
        meteor.style.opacity = "0";

        setTimeout(function() {
            document.body.removeChild(meteor);
        }, 2000); // 等待2秒后删除流星元素
    }, (delay + duration) * 1000);
}

function startMeteorShower() {
    setInterval(createMeteor, 500); // 每隔0.5秒创建一个流星
}

startMeteorShower();
</script>
